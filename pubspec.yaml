name: accounting_pro_smart_mobile_v3
description: Smart mobile Arabic accounting app with calm UI, automation, PDF and Excel.
publish_to: "none"
version: 3.0.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  share_plus: ^10.1.2
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.13.4
  excel: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
